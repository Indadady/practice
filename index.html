    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        
        /* ========================================================
           인쇄 최적화 (투어메이커 표준양식 완벽 구현 및 선 삐져나옴 방지)
           ======================================================== */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; padding: 0 !important; margin: 0 !important; overflow-x: visible !important; }
            
            * { 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
                box-sizing: border-box !important; /* 박스 사이징 강제 */

            @page { size: A4 portrait; margin: 10mm 10mm; }

            .print-page { 
                box-shadow: none !important; padding: 0 !important; border: none !important; margin: 0 !important; 
                page-break-after: always; break-inside: avoid !important; 
                display: flex !important; flex-direction: column !important; justify-content: space-between !important;
                height: 277mm !important; 
                width: 100% !important;
                max-width: 100% !important;
                overflow: hidden !important; /* 미세한 테두리 오버플로우 절단 */
                position: relative;
            }
            .print-page:last-child { page-break-after: auto; }
            
            table { 
                border-collapse: collapse !important; 
                width: 100% !important; 
                max-width: 100% !important;
                table-layout: fixed !important; /* 열 너비 고정으로 삐져나옴 방지 */
            }
            thead { display: table-header-group; }
            tr { page-break-inside: avoid; }
            th, td { 
                border: none !important; border-bottom: 1px solid #cbd5e1 !important; 
                padding: 6px 2px !important; 
                word-wrap: break-word !important; word-break: keep-all !important;
            }
            th { border-top: 2px solid #1e293b !important; border-bottom: 2px solid #1e293b !important; color: #1e293b !important; }
            
            .print-footer { 
                margin-top: auto !important; 
                page-break-inside: avoid;
                width: 100%;
                padding-top: 15px !important;
                background: white !important;
            }

            .print-rooming-list { box-shadow: none !important; padding: 0 !important; border: none !important; margin: 0 !important; display: flex !important; flex-direction: column !important; }

            input, select, textarea { border: none !important; background: transparent !important; appearance: none; -webkit-appearance: none; }
            input::placeholder, textarea::placeholder { color: transparent !important; }
        }

        .dragging { opacity: 0.55; background-color: #e0f2fe; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }

        .editable-cell-input { 
            white-space: normal !important; 
            width: 100% !important; 
            transition: all 0.15s ease;
            font-family: inherit;
        }
        .editable-cell-input:hover { background-color: #f1f5f9; cursor: text; border-radius: 4px; overflow: visible; }
        .editable-cell-input:focus { background-color: #e0f2fe; border-bottom: 2px solid #3b82f6; outline: none; overflow: visible; }

        .table-wrapper { overflow-x: auto; width: 100%; padding-bottom: 15px; -webkit-overflow-scrolling: touch; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 방배정 전용 황금비율 그리드 (PDF 양식 기준) */

        @media print {
            .room-grid { grid-template-columns: 8% 12% 1fr 20%; }

        .room-row input::placeholder { color: transparent !important; transition: color 0.2s ease-in-out; }

<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useMemo, useEffect } = React;

        // 지정된 공식 투어메이커 헤더 로고 URL
        const TM_LOGO = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgHfgIX70O5k6Anuo0UgALIdaG9jSga9auHu3uyz0uEirylGPAJnjN_qQbvEGMUvPqUQf_g9FMNUHRxlDcUBf4vZ3Mpy4TnA9WxbmzWYK11gt2zuy_Irl4wctNFjcjLyPo0GPXV792o_J7L9guRMuDfeC1gy7USwywjYbECZgzcsHybuGRRAXAnO1eNmP8/s320/logo.png";
        
        // 하단 로고(TM_FOOTER_LOGO)는 인쇄 표준 원칙에 따라 "로고 이미지 생략, 텍스트만 표시" 규칙 적용으로 제외됨

        // 영문 자동 변환 로직
        const getRomanization = (char) => {
            const CHO = ["G","KK","N","D","TT","R","M","B","PP","S","SS","","J","JJ","CH","K","T","P","H"];
            const JUNG = ["A","AE","YA","YAE","EO","E","YEO","YE","O","WA","WAE","OE","YO","U","WO","WE","WI","YU","EU","UI","I"];
            const JONG = ["","K","K","K","N","N","N","T","L","L","M","P","L","L","P","L","M","P","P","T","T","NG","T","T","K","T","P","T"];
            const code = char.charCodeAt(0) - 0xAC00;
            if (code < 0 || code > 11171) return char; 
            return CHO[Math.floor(code / 588)] + JUNG[Math.floor((code % 588) / 28)] + JONG[code % 28];
        }

        const koreanToEnglish = (name) => {
            if (!name) return "";
            const fNames = {"김":"KIM", "이":"LEE", "박":"PARK", "최":"CHOI", "정":"JUNG", "강":"KANG", "조":"CHO", "윤":"YOON", "장":"JANG", "임":"LIM", "홍":"HONG", "송":"SONG", "오":"OH", "서":"SEO", "신":"SHIN", "권":"KWON", "황":"HWANG", "안":"AHN", "유":"YOO", "전":"JEON", "배":"BAE", "고":"KO", "문":"MOON", "양":"YANG", "손":"SON", "백":"BAEK", "허":"HEO", "남":"NAM", "심":"SHIM", "노":"NOH", "하":"HA", "곽":"KWAK", "성":"SUNG", "차":"CHA", "주":"JOO", "우":"WOO", "구":"KOO", "나":"NA", "민":"MIN", "엄":"EOM", "채":"CHAE", "원":"WON", "방":"BANG", "공":"KONG"};
            const char1 = name.charAt(0);
            const engFamily = fNames[char1] || getRomanization(char1);
            let engGiven = "";
            for(let i = 1; i < name.length; i++) engGiven += getRomanization(name.charAt(i));
            return `${engFamily} ${engGiven}`.trim(); 
        };

        // UI 컴포넌트
        const AutoResizeTextarea = ({ value, onChange, placeholder, minRows = 4 }) => {
            const textareaRef = useRef(null);
            const handleChange = (e) => onChange(e.target.value);
            useEffect(() => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = 'auto';
                    textareaRef.current.style.height = Math.max(textareaRef.current.scrollHeight, minRows * 24 + 32) + 'px';
                }
            }, [value, minRows]);
            return <textarea ref={textareaRef} className="w-full p-3 md:p-4 text-xs md:text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition font-mono leading-relaxed resize-none overflow-hidden" placeholder={placeholder} value={value} onChange={handleChange} rows={minRows} />;
        };

        const HeaderField = ({ label, value = "", onChange, isMain = false, fontSize, placeholder = "" }) => (
            <div className="flex items-center gap-2 print:gap-4 w-full box-border">
                <span className={`font-black text-slate-500 tracking-widest uppercase flex-shrink-0 whitespace-nowrap`} 
                      style={{ fontSize: `${isMain ? Math.max(9, fontSize - 1) : Math.max(8, fontSize - 1.5)}pt`, width: `${Math.max(140, fontSize * 11)}px` }}>
                    {label}
                </span>
                <input 
                    type="text" 
                    className={`flex-1 min-w-0 border-b border-transparent hover:border-slate-300 focus:border-blue-500 outline-none px-2 transition-all text-slate-800 ${isMain ? 'font-black' : 'font-bold'}`}
                    style={{ fontSize: `${isMain ? fontSize + 4 : fontSize}pt` }}
                    value={value} 
                    placeholder={placeholder}
                    onChange={(e) => onChange(e.target.value)} 
                />
            </div>
        );

        const EditableCell = ({ val = "", onChange, bold = false, uppercase = false, placeholder = '', center = false, fontSize }) => (
            <input 
                type="text"
                title="클릭하여 내용을 수정하세요"
                className={`editable-cell-input bg-transparent outline-none border-b border-transparent focus:border-blue-400 p-0 m-0 ${bold ? 'font-black text-slate-900' : ''} ${uppercase ? 'uppercase' : ''} ${center ? 'text-center' : 'text-left'}`}
                style={{ fontSize: 'inherit' }}
                value={val}
                placeholder={placeholder}
                onChange={(e) => onChange(e.target.value)}
            />
        );

        const RoomRow = ({ room, actualIdx, globalIdx, updateRoom, updateGuest, changeRoomType, removeRoom, dragRoomStart, dragRoomEnter, dragRoomEnd, dropRoom, fontSize, isInternationalRooming }) => (
            <div
                className="room-row room-grid group relative bg-white w-full h-full border-b border-slate-300 last:border-b-0 print:border-b box-border"
                style={{ breakInside: 'avoid' }}
                draggable
                onDragStart={(e) => dragRoomStart(e, globalIdx)}
                onDragEnter={(e) => dragRoomEnter(e, globalIdx)}
                onDragEnd={dragRoomEnd}
                onDrop={dropRoom}
                onDragOver={(e) => e.preventDefault()}
            >
                <div className="no-print flex items-center justify-center border-r border-slate-200 text-slate-300 hover:text-blue-500 drag-handle" title="드래그하여 방 순서 변경">
                    <i className="fas fa-bars"></i>
                </div>

                <div className="flex items-center justify-center border-r border-slate-200 py-1 bg-slate-50">
                    <span className="font-bold text-slate-700 text-center" style={{ fontSize: `${fontSize}pt` }}>{actualIdx}</span>
                </div>

                <div className="flex items-center justify-center border-r border-slate-200 py-1 px-1">
                    <select className="font-bold text-slate-600 bg-transparent outline-none cursor-pointer w-full text-center" style={{ fontSize: `${Math.max(8, fontSize - 1)}pt` }} value={room.type} onChange={(e) => changeRoomType(globalIdx, e.target.value)}>
                        <option value="TWIN">TWN</option><option value="TRIPLE">TRP</option><option value="SINGLE">SGL</option><option value="QUAD">QUAD</option>
                    </select>
                </div>

                <div className="flex flex-col py-0.5 bg-white min-w-0 border-r border-slate-200 justify-center">
                    {room.guests.map((g, gIdx) => (
                        <div key={gIdx} className={`flex flex-col px-1.5 md:px-2 py-1 ${gIdx > 0 ? 'border-t border-dashed border-slate-200' : ''}`} style={{ padding: `${fontSize/2.5}px 4px` }}>
                            <div className="flex items-center gap-1 md:gap-2 w-full">
                                <input className="font-bold outline-none bg-transparent focus:text-blue-600" style={{ fontSize: `${fontSize}pt`, width: `${Math.max(70, fontSize * 6)}px` }} value={g.name} placeholder="이름" onChange={(e) => updateGuest(globalIdx, gIdx, 'name', e.target.value)} />
                                <button type="button" onClick={() => updateGuest(globalIdx, gIdx, 'gender', g.gender === '남' ? '여' : '남')} className={`flex-shrink-0 font-bold px-1.5 py-0.5 rounded cursor-pointer ${g.gender === '여' ? 'bg-pink-50 text-pink-600' : 'bg-blue-50 text-blue-600'}`} style={{ fontSize: `${Math.max(8, fontSize - 2)}pt`, minWidth: '26px' }}>
                                    {g.gender}
                                </button>
                                <input className="flex-1 min-w-[20px] text-slate-500 outline-none bg-transparent" style={{ fontSize: `${Math.max(9, fontSize - 1)}pt` }} placeholder="" value={g.remark} onChange={(e) => updateGuest(globalIdx, gIdx, 'remark', e.target.value)} />
                            </div>
                            {isInternationalRooming && (
                                <input className="font-bold tracking-wide text-slate-500 outline-none uppercase bg-transparent w-full mt-0.5" style={{ fontSize: `${Math.max(8, fontSize - 1.5)}pt` }} placeholder="ENGLISH NAME" value={g.engName} onChange={(e) => updateGuest(globalIdx, gIdx, 'engName', e.target.value)} />
                            )}
                        </div>
                    ))}
                </div>

                <div className="flex items-center justify-center p-1 bg-white min-w-0 relative">
                    <input className="w-full text-center font-bold text-slate-600 bg-transparent outline-none" style={{ fontSize: `${fontSize}pt` }} placeholder="추후 배정" value={room.roomNo} onChange={(e) => updateRoom(globalIdx, 'roomNo', e.target.value)} />
                    <button type="button" onClick={() => removeRoom(globalIdx)} className="no-print absolute -right-3 top-1/2 -translate-y-1/2 p-1.5 bg-white border border-slate-200 rounded-full text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 z-10 shadow-sm"><i className="fas fa-trash-alt" style={{ fontSize: `${Math.max(8, fontSize - 2)}pt` }}></i></button>
                </div>
            </div>
        );

        // 메인 컴포넌트
        const App = () => {
            const isInitialShared = useMemo(() => new URLSearchParams(window.location.search).get('shared') === 'true', []);
            const [isSharedMode, setIsSharedMode] = useState(isInitialShared);
            const [activeMainTab, setActiveMainTab] = useState(isInitialShared ? 'rooming' : 'traveler');
            const [isNavMenuOpen, setIsNavMenuOpen] = useState(true);

            const [docFontSize, setDocFontSize] = useState(10.5); 
            const [commonHeader, setCommonHeader] = useState({ groupName: "", date: "", location: "", number: "" });

            const [modal, setModal] = useState({ isOpen: false, type: 'alert', message: '', inputValue: '', onConfirm: null, onCancel: null });

            const showAlert = (message) => {
                setModal({ isOpen: true, type: 'alert', message, inputValue: '', onConfirm: () => setModal({ isOpen: false, type: 'alert', message: '', inputValue: '', onConfirm: null, onCancel: null }) });
            };

            const showPrompt = (message, defaultValue, callback) => {
                setModal({ isOpen: true, type: 'prompt', message, inputValue: defaultValue, 
                    onConfirm: () => { setModal({ isOpen: false, type: 'alert', message: '', inputValue: '', onConfirm: null, onCancel: null }); }, 
                    onCancel: () => { setModal({ isOpen: false, type: 'alert', message: '', inputValue: '', onConfirm: null, onCancel: null }); } 
                });
            };

            const showPrintConfirm = () => {
                setModal({
                    isOpen: true,
                    type: 'confirm',
                    message: "🖨️ 인쇄 전 필수 확인사항\n\n1. 용지 크기: A4\n2. 레이아웃: 세로\n3. 옵션: '배경 그래픽 포함' 체크\n\n* 프린터 환경에 따라 표가 잘리거나 양식이 깨질 수 있습니다.\n* 가급적 상단의 [완성본 엑셀 저장] 버튼을 이용해 파일 형태로 담당자에게 전달해 주시면 가장 오류가 적습니다.\n\n그래도 인쇄를 진행하시겠습니까?",
                    inputValue: '',
                    onConfirm: () => { 
                        setModal({ isOpen: false, type: 'alert', message: '', inputValue: '', onConfirm: null, onCancel: null }); 
                        setTimeout(() => { window.print(); }, 300); 
                    },
                    onCancel: () => { setModal({ isOpen: false, type: 'alert', message: '', inputValue: '', onConfirm: null, onCancel: null }); }
                });
            };

            // ==========================================
            // [TAB 1] 여행자 명단
            // ==========================================
            const [travelers, setTravelers] = useState([
                { id: 1, nameKor: "", nameEng: "", birth: "", gender: "M", passportNo: "", expiry: "", nation: "KOR", remark: "" }
            ]);

            const dragItem = useRef();
            const dragOverItem = useRef();

            const dragStart = (e, position) => { dragItem.current = position; e.target.closest('tr')?.classList.add('dragging'); };
            const dragEnter = (e, position) => { dragOverItem.current = position; };
            const drop = (e) => {
                const tr = e.target.closest('tr');
                if (tr) tr.classList.remove('dragging');
                if (dragItem.current === undefined || dragItem.current === null || dragOverItem.current === undefined || dragOverItem.current === null) return;
                setTravelers(prev => {
                    const copyListItems = [...prev];
                    const dragItemContent = copyListItems[dragItem.current];
                    if (!dragItemContent) return prev;
                    copyListItems.splice(dragItem.current, 1);
                    copyListItems.splice(dragOverItem.current, 0, dragItemContent);
                    return copyListItems;
                });
                dragItem.current = null; dragOverItem.current = null;
            };
            const dragEnd = (e) => { e.target.closest('tr')?.classList.remove('dragging'); dragItem.current = null; dragOverItem.current = null; };

            const getExpiryStatus = (dateStr) => {
                if (!dateStr) return { color: "text-slate-400", warning: false };
                
                let normalizedStr = dateStr;
                if (normalizedStr.replace(/\s/g, '').match(/^\d{6}$/)) {
                    let clean = normalizedStr.replace(/\s/g, '');
                    let y = parseInt(clean.substring(0, 2), 10);
                    y += (y > 50 ? 1900 : 2000); 
                    normalizedStr = `${y}-${clean.substring(2, 4)}-${clean.substring(4, 6)}`;
                }

                const match = normalizedStr.match(/(\d{2,4})[-./년]?\s*(\d{1,2})[-./월]?\s*(\d{1,2})/);
                if (!match) return { color: "text-slate-600", warning: false };
                
                let year = parseInt(match[1], 10);
                if (year < 100) { year += 2000; }
                const month = parseInt(match[2], 10);
                const day = parseInt(match[3], 10);

                const expDate = new Date(year, month - 1, day);
                const today = new Date();
                today.setHours(0,0,0,0);
                
                const sixMonthsLater = new Date();
                sixMonthsLater.setMonth(today.getMonth() + 6);
                sixMonthsLater.setHours(0,0,0,0);

                if (expDate < today) return { color: "text-red-600 font-bold bg-red-50", warning: true, msg: "만료됨" };
                if (expDate < sixMonthsLater) return { color: "text-orange-500 font-bold", warning: true, msg: "6개월 미만" };
                return { color: "text-slate-700", warning: false };
            };

            const addEmptyTraveler = () => setTravelers(prev => [...prev, { id: Date.now() + Math.random(), nameKor: "", nameEng: "", birth: "", gender: "M", passportNo: "", expiry: "", nation: "KOR", remark: "" }]);
            const removeTraveler = (id) => setTravelers(prev => prev.filter(t => t.id !== id));
            
            const updateField = (id, field, val) => {
                setTravelers(prev => prev.map(t => {
                    if (t.id === id) {
                        const updated = { ...t, [field]: val };
                        if (field === 'nameKor') {
                            if (!t.nameEng || t.nameEng === koreanToEnglish(t.nameKor)) {
                                updated.nameEng = koreanToEnglish(val);
                            }
                        }
                        if (field === 'nameEng') updated.nameEng = String(val).toUpperCase();
                        if (field === 'passportNo') updated.passportNo = String(val).toUpperCase();
                        if (field === 'nation') updated.nation = String(val).toUpperCase();
                        return updated;
                    }
                    return t;
                }));
            };

            const TRAVELER_ROWS_PER_PAGE = 25; 
            const travelerPages = [];
            const totalTravelerPages = Math.max(1, Math.ceil(travelers.length / TRAVELER_ROWS_PER_PAGE));
            for (let i = 0; i < totalTravelerPages; i++) {
                travelerPages.push({ pageIndex: i, data: travelers.slice(i * TRAVELER_ROWS_PER_PAGE, (i + 1) * TRAVELER_ROWS_PER_PAGE) });
            }

            // [여행자 엑셀 처리 로직]
            const downloadExcelTemplate = () => {
                const ws_data = [

                        let s = R === 0 ? { ...headerStyle } : { ...dataStyle };
                        
                        if (R === emptyRowIdx || R === logoRowIdx) {
                            s.border = {}; // 푸터 영역 테두리 제거
                            if (R === logoRowIdx && C === 4) s = { ...logoStyle };
                        } else {
                            s.border = { left: { style: "thin", color: { rgb: "CBD5E1" } }, right: { style: "thin", color: { rgb: "CBD5E1" } } };
                            if (R === 0) {
                                s.border.top = { style: "thick", color: { rgb: "000000" } };
                                s.border.bottom = { style: "thick", color: { rgb: "000000" } };
                            } else {
                                s.border.top = { style: "thin", color: { rgb: "E2E8F0" } };
                                if (borders.includes(R)) s.border.bottom = { style: "medium", color: { rgb: "64748B" } };
                                else s.border.bottom = { style: "thin", color: { rgb: "E2E8F0" } };
                            }
                        }
                        ws[cell].s = s;
                    }
                }
                
                const rowHeights = Array(ws_data.length).fill({ hpt: 20 });
                rowHeights[0] = { hpt: 25 }; 
                rowHeights[emptyRowIdx] = { hpt: 15 };
                rowHeights[logoRowIdx] = { hpt: 25 };
                ws['!rows'] = rowHeights; 
                
                ws['!cols'] = [{ wch: 6 }, { wch: 14 }, { wch: 22 }, { wch: 8 }, { wch: 20 }, { wch: 20 }];

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "방배정_명단");
                XLSX.writeFile(wb, commonHeader.groupName ? `${commonHeader.groupName}_방배정명단.xlsx` : `투어메이커_루밍리스트.xlsx`);
            };

            const handleRoomingSmartImport = () => {
                if (!importTextRooming.trim()) return;
                const lines = importTextRooming.split('\n').filter(l => l.trim().length > 0);
                const newRooms = lines.map((line, idx) => {
                    const rawNames = line.split(/[\s,/\t]+/).map(name => name.trim()).filter(Boolean);
                    const guests = rawNames.map(raw => {
                        const hasFemale = raw.includes('(여)') || /여$/.test(raw);
                        const cleanName = raw.replace(/\(여\)|\(남\)|여$|남$/g, '').trim();
                        return { name: cleanName, engName: isInternationalRooming ? koreanToEnglish(cleanName) : "", gender: hasFemale ? "여" : "남", remark: "" };
                    });
                    let type = 'TWIN';
                    if (guests.length <= 1) type = 'SINGLE';
                    else if (guests.length === 2) type = 'TWIN';
                    else if (guests.length === 3) type = 'TRIPLE';
                    else type = 'QUAD';
                    return { id: Date.now() + Math.random(), roomNo: "", type, guests: guests.slice(0, type === 'SINGLE' ? 1 : type === 'TWIN' ? 2 : type === 'TRIPLE' ? 3 : 4) };
                });
                
                setRooms(prev => {
                    if (prev.length === 1 && prev[0].guests.every(g => g.name === "")) return newRooms;
                    return [...prev, ...newRooms];
                });
                setImportTextRooming("");
            };

            const updateRoom = (rIdx, field, value) => { 
                setRooms(prev => prev.map((room, idx) => idx === rIdx ? { ...room, [field]: value } : room)); 
            };
            
            const updateGuest = (globalIdx, gIdx, field, value) => {
                setRooms(prev => prev.map((room, rIndex) => {
                    if (rIndex === globalIdx) {
                        const newGuests = room.guests.map((guest, guestIndex) => {
                            if (guestIndex === gIdx) {
                                const updatedGuest = { ...guest, [field]: value };
                                if (field === 'name' && isInternationalRooming) {
                                    if (!guest.engName || guest.engName === koreanToEnglish(guest.name)) {
                                        updatedGuest.engName = koreanToEnglish(value);
                                    }
                                }
                                if (field === 'engName') updatedGuest.engName = String(value).toUpperCase();
                                return updatedGuest;
                            }
                            return guest;
                        });
                        return { ...room, guests: newGuests };
                    }
                    return room;
                }));
            };

            const changeRoomType = (globalIdx, type) => {
                setRooms(prev => prev.map((room, rIndex) => {
                    if (rIndex === globalIdx) {
                        const capacity = type === 'SINGLE' ? 1 : (type === 'TWIN' ? 2 : (type === 'TRIPLE' ? 3 : 4));
                        let currentGuests = [...room.guests];
                        if (currentGuests.length < capacity) {
                            while(currentGuests.length < capacity) currentGuests.push({ name: "", engName: "", gender: "남", remark: "" });
                        } else {
                            currentGuests = currentGuests.slice(0, capacity);
                        }
                        return { ...room, type, guests: currentGuests };
                    }
                    return room;
                }));
            };

            const removeRoom = (globalIdx) => setRooms(prev => prev.filter((_, idx) => idx !== globalIdx));
            const addRoom = () => setRooms(prev => [...prev, { id: Date.now() + Math.random(), roomNo: '', type: 'TWIN', guests: [{name:"", engName:"", gender:"남", remark:""}, {name:"", engName:"", gender:"남", remark:""}] }]);

            // PDF 구조 기반 2단 분리를 위한 로직 (1페이지당 36개 방을 처리하여 18줄 생성)
            const ROOMS_PER_PAGE = 36;
            const roomPages = [];
            const totalRoomPages = Math.max(1, Math.ceil(rooms.length / ROOMS_PER_PAGE));
            for (let i = 0; i < totalRoomPages; i++) roomPages.push(rooms.slice(i * ROOMS_PER_PAGE, (i + 1) * ROOMS_PER_PAGE));

            // 시스템 기능들 (저장/불러오기/프린트 등)
            const exportData = () => {
                const dataToSave = { travelers, commonHeader, rooms };
                const blob = new Blob([JSON.stringify(dataToSave, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a'); link.href = url; link.download = `투어메이커_데이터_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
            };

            const importData = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.travelers) setTravelers(data.travelers);
                        if (data.commonHeader) setCommonHeader(data.commonHeader);
                        if (data.rooms) setRooms(data.rooms);
                        showAlert("✅ 저장된 데이터를 성공적으로 불러왔습니다.");
                    } catch (error) { showAlert("⚠️ 데이터를 읽는 중 오류가 발생했습니다."); }
                };
                reader.readAsText(file); e.target.value = '';
            };

            const handleCopyLink = () => {
                const baseUrl = window.location.origin + window.location.pathname;
                const shareUrl = `${baseUrl}?shared=true`;
                
                fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(shareUrl)}`)
                    .then(res => res.json())
                    .then(data => { executeCopy(data.shorturl || shareUrl); })
                    .catch(() => { executeCopy(shareUrl); });
            };

            const executeCopy = (urlToCopy) => {
                const textArea = document.createElement("textarea");
                textArea.value = urlToCopy; textArea.style.position = "fixed"; textArea.style.top = "-9999px"; textArea.style.left = "-9999px";
                document.body.appendChild(textArea); textArea.focus(); textArea.select();
                try {
                    const successful = document.execCommand('copy');
                    if(successful) showAlert(`✅ 담당자 공유용 단축 링크(${urlToCopy})가 복사되었습니다!`);
                    else showPrompt("자동 복사에 실패했습니다. 복사해주세요:", urlToCopy);
                } catch (err) { showPrompt("자동 복사에 실패했습니다. 복사해주세요:", urlToCopy); } 
                finally { document.body.removeChild(textArea); }
            };

            const handlePrint = () => {
                if(isSharedMode) {
                    showPrintConfirm();
                } else {
                    setTimeout(() => { window.print(); }, 100);
                }
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 relative">
                    {/* 상단 헤더 */}
                    <div className="no-print bg-[#1e293b] border-b shadow-md sticky top-0 z-50">
                        <div className="max-w-[1400px] mx-auto px-3 md:px-4 flex flex-col md:flex-row justify-between items-center py-2 md:py-0 gap-2 md:gap-3">
                            <div className="flex w-full md:w-auto justify-center md:justify-start items-center pb-1 md:pb-0">
                                <div className="flex items-center gap-2 md:gap-3">
                                    <img src={TM_LOGO} className="h-5 md:h-6 filter brightness-0 invert" alt="Tourmaker Logo" />
                                    <div className="h-3 md:h-4 w-[1px] bg-slate-500"></div>
                                    <h1 className="font-bold text-white tracking-wide text-xs md:text-sm">통합 관리 센터</h1>
                                </div>
                            </div>
                            
                            <div className="flex w-full md:w-auto justify-center overflow-x-auto hide-scrollbar">
                                <button onClick={() => setActiveMainTab('traveler')} className={`whitespace-nowrap px-3 md:px-5 py-2 md:py-4 h-full flex items-center font-bold text-[13px] md:text-sm border-b-[3px] transition-all md:rounded-t-md ${activeMainTab === 'traveler' ? 'border-blue-400 text-white bg-slate-800' : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>
                                    <i className="fas fa-passport mr-2"></i> 1. 여행자 명단
                                </button>
                                <button onClick={() => setActiveMainTab('rooming')} className={`whitespace-nowrap px-3 md:px-5 py-2 md:py-4 h-full flex items-center font-bold text-[13px] md:text-sm border-b-[3px] transition-all md:rounded-t-md ${activeMainTab === 'rooming' ? 'border-blue-400 text-white bg-slate-800' : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>
                                    <i className="fas fa-bed mr-2"></i> 2. 방 배정 (루밍)
                                </button>
                            </div>

                            <div className="flex w-full md:w-auto justify-end gap-2 pt-1 md:pt-0 border-t border-slate-700 md:border-none">
                                {!isSharedMode && (
                                    <React.Fragment>
                                        <button onClick={handleCopyLink} className="text-slate-300 hover:text-white px-2 py-1.5 text-xs font-bold transition flex items-center gap-1" title="링크 복사"><i className="fas fa-link"></i> 링크 복사</button>
                                        <input type="file" id="json-upload" accept=".json" className="hidden" onChange={importData} />
                                        <label htmlFor="json-upload" className="cursor-pointer text-slate-300 hover:text-white px-2 py-1.5 text-xs font-bold transition flex items-center gap-1" title="데이터 불러오기"><i className="fas fa-folder-open"></i> 불러오기</label>
                                        <button onClick={exportData} className="text-slate-300 hover:text-white px-2 py-1.5 text-xs font-bold transition flex items-center gap-1" title="데이터 저장"><i className="fas fa-save"></i> 데이터 저장</button>
                                    </React.Fragment>
                                )}
                                <button onClick={handlePrint} className="bg-blue-600 text-white px-3 md:px-4 py-1.5 md:py-2 rounded font-bold text-xs md:text-sm hover:bg-blue-500 transition shadow flex items-center gap-2">
                                    <i className="fas fa-file-pdf"></i> PDF 인쇄
                                </button>
                            </div>
                        </div>
                    </div>

                    <main className="flex-grow p-0 sm:p-4 md:p-8">
                        {/* ========================================================================= */}
                        {/* TAB 1: 여행자 명단 */}
                        {/* ========================================================================= */}
                        <div className={activeMainTab === 'traveler' ? 'block' : 'hidden'}>
                            {isSharedMode && (
                                <div className="no-print max-w-[1400px] mx-auto px-3 mt-4 mb-1">
                                    <div className="bg-indigo-50 border-l-4 border-indigo-500 p-3 rounded text-[13px] md:text-sm text-indigo-800 font-bold flex flex-col md:flex-row justify-between items-start md:items-center gap-2 shadow-sm">
                                        <div>
                                            <i className="fas fa-info-circle mr-1 text-indigo-600"></i>
                                            담당자님, 작성을 모두 마치신 후 가급적 우측의 <span className="text-indigo-900 bg-indigo-100 px-1.5 py-0.5 rounded mx-0.5">완성본 엑셀 저장</span> 버튼을 눌러 엑셀 파일로 전달해 주시면 가장 오류가 적습니다.
                                        </div>
                                    </div>
                                </div>
                            )}
                            <div className="no-print max-w-[1400px] mx-auto mb-3 flex flex-col gap-2 px-3 md:px-4 bg-blue-50 py-3 rounded border border-blue-100 mt-2">
                                <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2">
                                    <p className="text-[11px] md:text-sm text-blue-800 font-bold leading-relaxed">
                                        <i className="fas fa-lightbulb text-amber-500 mr-2"></i> 셀을 마우스로 클릭해 직접 타이핑하세요. (좌측 ≡ 드래그로 행 순서 변경 가능)
                                    </p>
                                    <div className="flex items-center gap-2 self-end sm:self-auto flex-wrap justify-end">
                                        <div className="flex items-center gap-2 bg-white px-2 py-1.5 rounded shadow-sm border border-emerald-400">
                                            {!isSharedMode && (
                                                <React.Fragment>
                                                    <button onClick={downloadExcelTemplate} className="text-[11px] md:text-xs font-bold text-emerald-600 hover:text-emerald-800 flex items-center gap-1 transition whitespace-nowrap"><i className="fas fa-download"></i> 양식 다운</button>
                                                    <div className="w-[1px] h-3 bg-emerald-300"></div>
                                                    <label htmlFor="excel-upload" className="cursor-pointer text-[11px] md:text-xs font-bold text-emerald-600 hover:text-emerald-800 flex items-center gap-1 transition m-0 whitespace-nowrap"><i className="fas fa-upload"></i> 명단 업로드</label>
                                                    <input type="file" id="excel-upload" accept=".xlsx, .xls" className="hidden" onChange={importExcelData} />
                                                    <div className="w-[1px] h-3 bg-emerald-300"></div>
                                                </React.Fragment>
                                            )}
                                            <button onClick={exportTravelersToExcel} className="text-[11px] md:text-xs font-black text-emerald-700 hover:text-emerald-900 flex items-center gap-1 transition whitespace-nowrap"><i className="fas fa-file-excel"></i> 완성본 엑셀 저장</button>
                                        </div>
                                        <div className="flex items-center gap-2 bg-white px-2 py-1.5 rounded shadow-sm border border-slate-200">
                                            <span className="text-xs font-bold text-slate-500 whitespace-nowrap"><i className="fas fa-search-plus"></i> 크기:</span>
                                            <button onClick={() => setDocFontSize(Math.max(8, docFontSize - 0.5))} className="w-5 h-5 flex justify-center items-center bg-slate-100 hover:bg-slate-200 rounded text-slate-600 font-bold">-</button>
                                            <span className="text-xs font-bold text-blue-600 w-10 text-center">{docFontSize}pt</span>
                                            <button onClick={() => setDocFontSize(Math.min(16, docFontSize + 0.5))} className="w-5 h-5 flex justify-center items-center bg-slate-100 hover:bg-slate-200 rounded text-slate-600 font-bold">+</button>
                                        </div>
                                        {!isSharedMode && <button onClick={() => setTravelers([{ id: Date.now(), nameKor: "", nameEng: "", birth: "", gender: "M", passportNo: "", expiry: "", nation: "KOR", remark: "" }])} className="text-[10px] md:text-xs text-red-500 hover:text-red-700 font-bold underline whitespace-nowrap ml-1"><i className="fas fa-trash-alt"></i> 초기화</button>}
                                        <span className="text-[11px] md:text-sm font-black text-slate-700 whitespace-nowrap ml-2">실 인원 <span className="text-blue-600 text-base md:text-lg">{travelers.length}</span> 명</span>
                                    </div>
                                </div>
                            </div>

                            {travelerPages.map((page) => (
                                <div key={page.pageIndex} className="print-page bg-white w-full max-w-full xl:max-w-[1400px] mx-auto shadow-xl p-3 sm:p-5 md:p-8 xl:px-12 flex flex-col justify-between border border-slate-200 mb-8 box-border" style={{ minHeight: '277mm' }}>
                                    <div className="w-full flex-1 flex flex-col overflow-hidden">
                                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end border-b-[3px] border-slate-900 pb-3 md:pb-4 mb-3 gap-4 w-full box-border">
                                            <div className="space-y-3 flex-1 w-full min-w-0">
                                                <h2 className="font-black tracking-tighter text-slate-900 mt-2" style={{ fontSize: `${docFontSize * 2.2}pt` }}>OVERSEAS TRAVELERS LIST</h2>
                                                <div className="flex flex-col gap-1.5 font-bold text-slate-700 w-full print:max-w-none max-w-full sm:max-w-[600px] box-border">
                                                    <HeaderField label="GROUP NAME" value={commonHeader.groupName} onChange={(v) => setCommonHeader({ ...commonHeader, groupName: v })} fontSize={docFontSize} placeholder="단체명" />
                                                    <HeaderField label="DATE" value={commonHeader.date} onChange={(v) => setCommonHeader({ ...commonHeader, date: v })} fontSize={docFontSize} placeholder="YYYY.MM.DD" />
                                                    <HeaderField label="NATION" value={commonHeader.location} onChange={(v) => setCommonHeader({ ...commonHeader, location: v })} fontSize={docFontSize} placeholder="지역" />
                                                    <HeaderField label="NUMBER" value={commonHeader.number} onChange={(v) => setCommonHeader({ ...commonHeader, number: v })} fontSize={docFontSize} placeholder="인원" />
                                                </div>
                                            </div>
                                            <div className="text-left sm:text-right flex flex-col items-start sm:items-end w-full sm:w-auto self-end flex-shrink-0">
                                                <div className="text-red-500 font-black italic mb-1 md:mb-0 bg-red-50 px-3 py-1 border border-red-200" style={{ fontSize: `${Math.max(9, docFontSize - 1)}pt` }}>여권 만료일 6개월 확인필</div>
                                                {totalTravelerPages > 1 && <div className="mt-2 text-slate-500 font-bold" style={{ fontSize: `${Math.max(8, docFontSize - 2)}pt` }}>Page {page.pageIndex + 1} / {totalTravelerPages}</div>}
                                            </div>
                                        </div>

                                        <div className="table-wrapper w-full relative flex-1 box-border">
                                            <table className="w-full border-collapse min-w-full print:min-w-0 border-b-[3px] print:border-b-2 border-slate-800" style={{ fontSize: `${docFontSize}pt`, tableLayout: 'fixed' }}>
                                                <colgroup>
                                                    <col className="no-print w-[3%]" />
                                                    <col className="w-[4%] print:w-[5%]" />
                                                    <col className="w-[10%] print:w-[12%]" />
                                                    <col className="w-[22%] print:w-[23%]" />
                                                    <col className="w-[12%] print:w-[14%]" />
                                                    <col className="w-[5%] print:w-[6%]" />
                                                    <col className="w-[14%] print:w-[16%]" />
                                                    <col className="w-[12%] print:w-[13%]" />
                                                    <col className="w-[7%] print:w-[8%]" />
                                                    <col className="w-[11%] print:w-[3%]" />
                                                    <col className="no-print w-[4%]" />
                                                </colgroup>
                                                <thead className="print:table-header-group">
                                                    <tr className="text-slate-800 border-b-2 border-slate-800 bg-transparent">
                                                        <th className="no-print text-center py-2"><i className="fas fa-sort text-slate-300"></i></th>
                                                        <th className="text-center font-bold py-2 border-x-transparent">NO</th>
                                                        <th className="text-center font-bold py-2 border-x-transparent">성명</th>
                                                        <th className="text-left font-bold pl-2 py-2 border-x-transparent">NAME</th>
                                                        <th className="text-center font-bold py-2 border-x-transparent">생년월일</th>
                                                        <th className="text-center font-bold py-2 border-x-transparent">성별</th>
                                                        <th className="text-center font-bold py-2 border-x-transparent">여권번호</th>
                                                        <th className="text-center font-bold whitespace-nowrap py-2 border-x-transparent">만료일</th>
                                                        <th className="text-center font-bold py-2 border-x-transparent">국적</th>
                                                        <th className="text-left font-bold py-2 border-x-transparent">기타</th>
                                                        <th className="no-print text-center font-bold py-2">삭제</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="print:table-row-group text-slate-800">
                                                    {page.data.map((t, localIdx) => {
                                                        const actualIdx = (page.pageIndex * TRAVELER_ROWS_PER_PAGE) + localIdx + 1;
                                                        const status = getExpiryStatus(t.expiry);
                                                        const globalIdx = actualIdx - 1; 
                                                        return (
                                                            <tr key={t.id} className="border-b border-slate-200 hover:bg-slate-50 transition group bg-white fixed-row-height" draggable onDragStart={(e) => dragStart(e, globalIdx)} onDragEnter={(e) => dragEnter(e, globalIdx)} onDragEnd={dragEnd} onDrop={drop} onDragOver={(e) => e.preventDefault()}>
                                                                <td className="no-print text-center text-slate-300 hover:text-blue-500 drag-handle"><i className="fas fa-bars"></i></td>
                                                                <td className="text-center text-slate-500 font-bold">{actualIdx}</td>
                                                                <td className="border-r border-slate-200 text-center"><EditableCell val={t.nameKor} onChange={(v) => updateField(t.id, 'nameKor', v)} bold center fontSize={docFontSize} /></td>
                                                                <td className="border-r border-slate-200 pl-2"><EditableCell val={t.nameEng} onChange={(v) => updateField(t.id, 'nameEng', v.toUpperCase())} uppercase fontSize={docFontSize} /></td>
                                                                <td className="border-r border-slate-200 text-center"><EditableCell val={t.birth} onChange={(v) => updateField(t.id, 'birth', v)} placeholder="YY-MM-DD" center fontSize={docFontSize} /></td>
                                                                <td className="border-r border-slate-200 text-center">
                                                                    <select className="bg-transparent border-none outline-none cursor-pointer text-slate-700 font-bold w-full p-0 text-center" style={{ fontSize: 'inherit' }} value={t.gender} onChange={(e) => updateField(t.id, 'gender', e.target.value)}><option value="M">M</option><option value="F">F</option></select>
                                                                </td>
                                                                <td className="border-r border-slate-200 text-center"><EditableCell val={t.passportNo} onChange={(v) => updateField(t.id, 'passportNo', v.toUpperCase())} uppercase center fontSize={docFontSize} /></td>
                                                                <td className={`border-r border-slate-200 text-center ${status.color}`}>
                                                                    <div className="flex items-center justify-center gap-1 w-full relative">
                                                                        <EditableCell val={t.expiry} onChange={(v) => updateField(t.id, 'expiry', v)} placeholder="YY-MM-DD" center fontSize={docFontSize} />
                                                                        {status.warning && <i className="fas fa-exclamation-triangle text-orange-400 no-print absolute right-1" title={status.msg}></i>}
                                                                    </div>
                                                                </td>
                                                                <td className="border-r border-slate-200 text-center"><EditableCell val={t.nation} onChange={(v) => updateField(t.id, 'nation', v)} uppercase center fontSize={docFontSize} /></td>
                                                                <td className="pl-1"><EditableCell val={t.remark} onChange={(v) => updateField(t.id, 'remark', v)} fontSize={docFontSize} /></td>
                                                                <td className="no-print text-center"><button onClick={() => removeTraveler(t.id)} className="text-slate-300 hover:text-red-500 transition px-1"><i className="fas fa-trash-alt"></i></button></td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    <div className="print-footer w-full mt-auto pt-8">
                                        <div className="flex justify-between items-end border-t-[2px] border-slate-800 pt-4 pb-2 w-full">
                                            <div className="font-bold text-slate-500" style={{ fontSize: `${Math.max(8, docFontSize - 2)}pt` }}>
                                                제출일: {new Date().toLocaleDateString()}
                                            </div>
                                            <div className="flex flex-col items-end justify-center gap-1 pr-1">
                                                {/* 투어메이커 인쇄 규정에 따라 하단 로고 이미지는 과감히 제거하여 잘림 문제를 완벽히 해결합니다. 텍스트로 대체. */}
                                                <p className="text-[#6c757d] leading-relaxed m-0 font-bold text-right tracking-tight" style={{ fontSize: `${Math.max(7, docFontSize - 3)}pt` }}>
                                                    [System Powered by TOURMAKER]<br/>본 스마트 가이드북은 해당 단체의 기획과 투어메이커의 트래블 테크 기술 제휴로 제작되었습니다.
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            <div className="no-print mt-6 mb-12 flex justify-center">
                                <button onClick={addEmptyTraveler} className="bg-white border-2 border-dashed border-blue-300 text-blue-600 font-bold text-sm px-10 py-4 rounded-xl flex items-center gap-2 hover:bg-blue-50 transition shadow-sm"><i className="fas fa-plus text-lg"></i> 탑승객 추가</button>
                            </div>
                        </div>

                        {/* ========================================================================= */}
                        {/* TAB 2: 방 배정 (루밍리스트) */}
                        {/* ========================================================================= */}
                        <div className={activeMainTab === 'rooming' ? 'block' : 'hidden'}>
                            <div className="w-full max-w-full xl:max-w-[1400px] mx-auto p-0 sm:p-4 md:p-6 print-rooming-list">
                                <div className="no-print mb-4 md:mb-6">
                                    {isSharedMode && (
                                        <div className="mb-4 bg-indigo-50 border-l-4 border-indigo-500 p-3 rounded text-[13px] md:text-sm text-indigo-800 font-bold flex flex-col md:flex-row justify-between items-start md:items-center gap-2 shadow-sm">
                                            <div>
                                                <i className="fas fa-info-circle mr-1 text-indigo-600"></i>
                                                담당자님, 작성을 모두 마치신 후 가급적 우측의 <span className="text-indigo-900 bg-indigo-100 px-1.5 py-0.5 rounded mx-0.5">완성본 엑셀 저장</span> 버튼을 눌러 엑셀 파일로 전달해 주시면 가장 오류가 적습니다.
                                            </div>
                                        </div>
                                    )}
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-3 mb-4 bg-blue-50 py-3 px-3 md:px-4 rounded border border-blue-100">
                                        
                                        <div className="flex flex-col sm:flex-row gap-2 md:items-center">
                                            <div className="flex bg-white p-1 rounded-lg border border-slate-200 shadow-sm w-full sm:w-auto">
                                                <button onClick={() => setIsInternationalRooming(false)} className={`flex-1 sm:flex-none px-3 py-1.5 rounded text-xs md:text-sm font-bold transition ${!isInternationalRooming ? 'bg-blue-50 text-blue-600' : 'text-slate-500'}`}>국내행사(한글)</button>
                                                <button onClick={() => setIsInternationalRooming(true)} className={`flex-1 sm:flex-none px-3 py-1.5 rounded text-xs md:text-sm font-bold transition ${isInternationalRooming ? 'bg-blue-50 text-blue-600' : 'text-slate-500'}`}>해외행사(영문)</button>
                                            </div>
                                            <p className="text-[11px] md:text-xs text-blue-800 font-bold leading-relaxed ml-1 hidden lg:block">
                                                <i className="fas fa-lightbulb text-amber-500 mr-1"></i> 텍스트를 복사해 붙여넣으면 시스템이 알아서 배치합니다.
                                            </p>
                                        </div>
                                        
                                        <div className="flex items-center gap-2 flex-wrap justify-end">
                                            <div className="flex items-center gap-2 bg-white px-2 py-1.5 rounded shadow-sm border border-emerald-400">
                                                {!isSharedMode && (
                                                    <React.Fragment>
                                                        <button onClick={downloadRoomingExcelTemplate} className="text-[11px] md:text-xs font-bold text-emerald-600 hover:text-emerald-800 flex items-center gap-1 transition whitespace-nowrap" title="루밍 엑셀 양식 다운로드"><i className="fas fa-download"></i> 양식 다운</button>
                                                        <div className="w-[1px] h-3 bg-emerald-300"></div>
                                                    </React.Fragment>
                                                )}
                                                <button onClick={exportRoomingToExcel} className="text-[11px] md:text-xs font-black text-emerald-700 hover:text-emerald-900 flex items-center gap-1 transition whitespace-nowrap" title="방배정 엑셀로 내보내기"><i className="fas fa-file-excel"></i> 완성본 엑셀 저장</button>
                                            </div>
                                            
                                            <div className="flex items-center gap-2 bg-white px-2 py-1.5 rounded shadow-sm border border-slate-200">
                                                <span className="text-xs font-bold text-slate-500"><i className="fas fa-search-plus"></i> 크기:</span>
                                                <button onClick={() => setDocFontSize(Math.max(8, docFontSize - 0.5))} className="w-5 h-5 flex justify-center items-center bg-slate-100 hover:bg-slate-200 rounded text-slate-600 font-bold">-</button>
                                                <span className="text-xs font-bold text-blue-600 w-10 text-center">{docFontSize}pt</span>
                                                <button onClick={() => setDocFontSize(Math.min(16, docFontSize + 0.5))} className="w-5 h-5 flex justify-center items-center bg-slate-100 hover:bg-slate-200 rounded text-slate-600 font-bold">+</button>
                                            </div>
                                            <button onClick={() => setIsNavMenuOpen(!isNavMenuOpen)} className="bg-white border border-slate-200 text-slate-600 hover:text-blue-600 px-3 py-1.5 rounded text-xs font-bold transition shadow-sm"><i className={`fas fa-chevron-${isNavMenuOpen ? 'up' : 'down'}`}></i> 복붙기능</button>
                                        </div>
                                    </div>

                                    {isNavMenuOpen && (
                                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-6">
                                            <div className="flex border-b border-slate-200 bg-slate-50 px-4 py-2.5 text-xs md:text-sm font-bold text-blue-700 items-center justify-center md:justify-start">
                                                <i className="fas fa-bolt text-amber-400 mr-2"></i> 스마트 변환기 (텍스트 복붙으로 명단 자동 완성)
                                            </div>
                                            <div className="p-4 md:p-5">
                                                <div className="flex flex-col md:flex-row gap-4 md:gap-6">
                                                    <div className="md:w-1/3">
                                                        <h4 className="font-bold mb-2 text-slate-800 text-xs md:text-sm flex items-center gap-2"><i className="fas fa-circle-info text-blue-500"></i> 한 줄에 한 객실씩 붙여넣기</h4>
                                                        <ul className="space-y-1.5 text-[11px] md:text-xs text-slate-600">
                                                            <li>1. 카톡/메모장 텍스트를 복사해 붙여넣으세요.</li>
                                                            <li>2. 자동으로 사람 이름만 쏙쏙 골라 방을 만듭니다.</li>
                                                        </ul>
                                                    </div>
                                                    <div className="flex-1 flex flex-col">
                                                        <AutoResizeTextarea placeholder="참가자1 참가자2&#10;참가자3 참가자4&#10;인솔자" value={importTextRooming} onChange={setImportTextRooming} minRows={4} />
                                                        <button onClick={handleRoomingSmartImport} className="w-full mt-3 py-2 bg-slate-800 text-white text-xs md:text-sm font-bold rounded-lg hover:bg-black transition shadow-sm"><i className="fas fa-wand-magic-sparkles mr-2"></i> 방 배정표 자동 생성</button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="space-y-6 print:space-y-0 w-full">
                                    {roomPages.map((pageRooms, pageIndex) => {
                                        const leftTableRooms = pageRooms.slice(0, Math.ceil(pageRooms.length / 2));
                                        const rightTableRooms = pageRooms.slice(Math.ceil(pageRooms.length / 2));
                                        const pageStartIndex = pageIndex * ROOMS_PER_PAGE;

                                        return (
                                            <div key={pageIndex} className={`print-page box-border overflow-hidden bg-white shadow-xl p-3 sm:p-5 md:p-8 border-t-[4px] md:border-t-[6px] border-slate-800 print:shadow-none print:p-0 print:border-none print:m-0 relative flex flex-col justify-between`} style={{ minHeight: '277mm', fontSize: `${docFontSize}pt` }}>
                                                <div className="flex-1 flex flex-col w-full box-border">
                                                    
                                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end border-b-[3px] border-slate-900 pb-3 md:pb-4 mb-3 gap-4 w-full box-border">
                                                        <div className="space-y-3 flex-1 w-full min-w-0">
                                                            <h2 className="font-black tracking-tighter text-slate-900 mt-2" style={{ fontSize: `${docFontSize * 2.2}pt` }}>ROOMING LIST</h2>
                                                            <div className="flex flex-col gap-1.5 font-bold text-slate-700 w-full print:max-w-none max-w-full sm:max-w-[750px] box-border">
                                                                <HeaderField label="GROUP" value={commonHeader.groupName} onChange={(v) => setCommonHeader({ ...commonHeader, groupName: v })} isMain={true} fontSize={docFontSize} placeholder="단체명" />
                                                                <HeaderField label="DATE" value={commonHeader.date} onChange={(v) => setCommonHeader({ ...commonHeader, date: v })} fontSize={docFontSize} placeholder="일정" />
                                                                <HeaderField label="LOCATION" value={commonHeader.location} onChange={(v) => setCommonHeader({ ...commonHeader, location: v })} fontSize={docFontSize} placeholder="지역" />
                                                                
                                                                <div className="flex items-center group w-full mt-1 md:mt-0 box-border">
                                                                    <span className="font-black text-slate-500 tracking-widest uppercase flex-shrink-0 whitespace-nowrap" style={{ fontSize: `${Math.max(8, docFontSize - 1.5)}pt`, width: `${Math.max(140, docFontSize * 11)}px` }}>TOTAL PAX</span>
                                                                    <div className="font-bold text-slate-800 flex-1 flex flex-row items-center gap-2 md:gap-3 px-1 md:px-2 whitespace-nowrap overflow-hidden" style={{ fontSize: `${docFontSize}pt` }}>
                                                                        <div className="flex items-center gap-1.5 md:gap-2">
                                                                            <span className="bg-slate-100 px-2 py-0.5 rounded border border-slate-200">총 인원: <span className="text-blue-600">{roomStats.total}</span>명</span>
                                                                        </div>
                                                                        <div className="flex items-center gap-1.5 hidden sm:flex">
                                                                            <span className="bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded border border-blue-200">TWN: {roomStats.roomCounts.TWIN}</span>
                                                                            <span className="bg-amber-50 text-amber-700 px-1.5 py-0.5 rounded border border-amber-200">TRP: {roomStats.roomCounts.TRIPLE}</span>
                                                                            <span className="bg-emerald-50 text-emerald-700 px-1.5 py-0.5 rounded border border-emerald-200">SGL: {roomStats.roomCounts.SINGLE}</span>
                                                                            {roomStats.roomCounts.QUAD > 0 && <span className="bg-violet-50 text-violet-700 px-1.5 py-0.5 rounded border border-violet-200">QAD: {roomStats.roomCounts.QUAD}</span>}
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="text-left sm:text-right flex flex-col items-start sm:items-end w-full sm:w-auto self-end flex-shrink-0">
                                                            {totalRoomPages > 1 && <div className="mt-2 text-slate-500 font-bold" style={{ fontSize: `${Math.max(8, docFontSize - 2)}pt` }}>Page {pageIndex + 1} / {totalRoomPages}</div>}
                                                        </div>
                                                    </div>

                                                    <div className="flex justify-between items-center mb-2 gap-2">
                                                        {isInternationalRooming ? <p className="font-bold text-red-600 no-print" style={{ fontSize: `${Math.max(9, docFontSize - 1)}pt` }}><i className="fas fa-exclamation-circle mr-1"></i> 자동 변환된 영문명은 여권과 상이할 수 있습니다. 꼭 재확인 바랍니다.</p> : <div></div>}
                                                    </div>

                                                    <div className="table-wrapper flex-1 w-full relative box-border overflow-hidden">
                                                        <div className="w-full border-t-[2px] border-slate-800 border-b-[3px] border-slate-800 print:border-b-2 flex flex-col bg-white box-border">
                                                            
                                                            {/* 표 헤더 */}
                                                            <div className="flex flex-col md:flex-row print:flex-row items-stretch w-full border-b-[2px] border-slate-800 text-slate-800 font-bold bg-slate-50 box-border" style={{ fontSize: `${Math.max(8, docFontSize - 1)}pt` }}>
                                                                <div className="room-grid text-center items-stretch w-full md:w-1/2 print:w-1/2 md:border-r-[2px] print:border-r-[2px] border-slate-800 box-border">
                                                                    <div className="no-print flex items-center justify-center py-2 border-r border-slate-200"><i className="fas fa-sort text-slate-300"></i></div>
                                                                    <div className="flex items-center justify-center py-2 border-r border-slate-200">NO</div>
                                                                    <div className="flex items-center justify-center py-2 border-r border-slate-200">TYPE</div>
                                                                    <div className="flex items-center justify-start pl-2 py-2 border-r border-slate-200">GUEST INFO</div>
                                                                    <div className="flex items-center justify-center py-2">ROOM NO</div>
                                                                </div>
                                                                <div className="room-grid text-center items-stretch w-full md:w-1/2 print:w-1/2 hidden md:grid print:grid box-border">
                                                                    <div className="no-print flex items-center justify-center py-2 border-r border-slate-200"><i className="fas fa-sort text-slate-300"></i></div>
                                                                    <div className="flex items-center justify-center py-2 border-r border-slate-200">NO</div>
                                                                    <div className="flex items-center justify-center py-2 border-r border-slate-200">TYPE</div>
                                                                    <div className="flex items-center justify-start pl-2 py-2 border-r border-slate-200">GUEST INFO</div>
                                                                    <div className="flex items-center justify-center py-2">ROOM NO</div>
                                                                </div>
                                                            </div>

                                                            {/* 표 몸통 (Row 단위) */}
                                                            <div className="flex flex-col w-full box-border">
                                                                {Array.from({ length: leftTableRooms.length }).map((_, i) => {
                                                                    const leftRoom = leftTableRooms[i];
                                                                    const rightRoom = rightTableRooms[i];
                                                                    const leftGlobalIdx = rooms.findIndex(r => r.id === leftRoom.id);
                                                                    const rightGlobalIdx = rightRoom ? rooms.findIndex(r => r.id === rightRoom.id) : -1;

                                                                    return (
                                                                        <div key={i} className="flex flex-col md:flex-row print:flex-row w-full items-stretch bg-white box-border">
                                                                            <div className="w-full md:w-1/2 print:w-1/2 md:border-r-[2px] print:border-r-[2px] border-slate-800 flex box-border">
                                                                                <RoomRow room={leftRoom} actualIdx={pageStartIndex + i + 1} globalIdx={leftGlobalIdx} updateRoom={updateRoom} updateGuest={updateGuest} changeRoomType={changeRoomType} removeRoom={removeRoom} dragRoomStart={dragRoomStart} dragRoomEnter={dragRoomEnter} dragRoomEnd={dragRoomEnd} dropRoom={dropRoom} fontSize={docFontSize} isInternationalRooming={isInternationalRooming} />
                                                                            </div>
                                                                            <div className="w-full md:w-1/2 print:w-1/2 flex border-b md:border-b-0 print:border-b-0 border-slate-300 box-border">
                                                                                {rightRoom ? (
                                                                                    <RoomRow room={rightRoom} actualIdx={pageStartIndex + leftTableRooms.length + i + 1} globalIdx={rightGlobalIdx} updateRoom={updateRoom} updateGuest={updateGuest} changeRoomType={changeRoomType} removeRoom={removeRoom} dragRoomStart={dragRoomStart} dragRoomEnter={dragRoomEnter} dragRoomEnd={dragRoomEnd} dropRoom={dropRoom} fontSize={docFontSize} isInternationalRooming={isInternationalRooming} />
                                                                                ) : (
                                                                                    <div className="w-full h-full bg-white border-b border-slate-300 last:border-b-0 print:border-b box-border"></div>
                                                                                )}
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="print-footer w-full mt-auto pt-8">
                                                    <div className="flex justify-between items-end border-t-[2px] border-slate-800 pt-4 pb-2 w-full">
                                                        <div className="font-bold text-slate-500" style={{ fontSize: `${Math.max(8, docFontSize - 2)}pt` }}>
                                                            제출일: {new Date().toLocaleDateString()}
                                                        </div>
                                                        <div className="flex flex-col items-end justify-center gap-1 pr-1">
                                                            {/* 하단 로고 이미지 생략, 텍스트 정보만 우측에 노출 */}
                                                            <p className="text-[#6c757d] leading-relaxed m-0 font-bold text-right tracking-tight" style={{ fontSize: `${Math.max(7, docFontSize - 3)}pt` }}>
                                                                [System Powered by TOURMAKER]<br/>본 스마트 가이드북은 해당 단체의 기획과 투어메이커의 트래블 테크 기술 제휴로 제작되었습니다.
                                                            </p>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                <div className="no-print mt-6 md:mt-8 flex justify-center">
                                    <button onClick={addRoom} className="bg-white border-2 border-dashed border-blue-300 text-blue-600 px-6 md:px-10 py-3 md:py-4 rounded-xl font-bold text-xs md:text-sm hover:bg-blue-50 hover:border-blue-500 transition-all shadow-sm"><i className="fas fa-bed text-lg mr-2"></i> 빈 객실 추가하기</button>
                                </div>
                            </div>
                        </div>

                        {modal.isOpen && (
                            <div className="no-print fixed inset-0 bg-slate-900 bg-opacity-50 flex items-center justify-center z-[99999] px-4 backdrop-blur-sm transition-opacity">
                                <div className="bg-white rounded-xl shadow-2xl max-w-sm md:max-w-md w-full p-6 text-center transform transition-all scale-100">
                                    <p className="text-slate-800 font-bold mb-6 text-[14px] md:text-[15px] leading-relaxed whitespace-pre-wrap text-left pl-2">{modal.message}</p>
                                    {modal.type === 'prompt' && <input type="text" className="w-full border-2 border-blue-200 focus:border-blue-500 rounded-lg px-4 py-2.5 mb-6 outline-none text-slate-700 font-bold text-center" value={modal.inputValue} readOnly />}
                                    <div className="flex justify-center gap-3">
                                        {(modal.type === 'prompt' || modal.type === 'confirm') && <button onClick={modal.onCancel} className="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-lg font-bold hover:bg-slate-200">취소(닫기)</button>}
                                        <button onClick={modal.onConfirm} className="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 shadow-sm">
                                            {modal.type === 'confirm' ? "그래도 인쇄하기" : "확인"}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
